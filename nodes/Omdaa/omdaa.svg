<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#25D366" opacity="0.1"/>
  
  <!-- Main WhatsApp-style Icon -->
  <g transform="translate(32, 32)">
    <!-- Chat Bubble -->
    <path d="M -16 -8 Q -16 -18 -8 -22 Q 0 -25 8 -22 Q 16 -18 16 -8 Q 16 2 8 6 L 8 14 L 0 8 Q -8 6 -12 2 Q -16 -2 -16 -8 Z" 
          fill="#25D366" 
          stroke="#1DA851" 
          stroke-width="1.5"/>
    
    <!-- Three Dots (Message Indicator) -->
    <circle cx="-6" cy="-8" r="2" fill="white"/>
    <circle cx="0" cy="-8" r="2" fill="white"/>
    <circle cx="6" cy="-8" r="2" fill="white"/>
    
    <!-- Connection Line -->
    <path d="M 10 8 Q 14 10 16 14" 
          stroke="#1DA851" 
          stroke-width="2" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- API Symbol (Small Code Brackets) -->
    <g transform="translate(-20, 12)">
      <path d="M 0 0 L -2 2 L 0 4" 
            stroke="#1DA851" 
            stroke-width="1.5" 
            stroke-linecap="round" 
            fill="none"/>
      <path d="M 4 0 L 6 2 L 4 4" 
            stroke="#1DA851" 
            stroke-width="1.5" 
            stroke-linecap="round" 
            fill="none"/>
    </g>
  </g>
  
  <!-- Omdaa Text (Optional - Arabic style) -->
  <text x="32" y="56" 
        font-family="Arial, sans-serif" 
        font-size="7" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#1DA851">
    OMDAA
  </text>
</svg>
